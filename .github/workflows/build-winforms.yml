name: Build WinForms app

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SocietiesManagementSystem.sln

      - name: Build (Release)
        run: dotnet build SocietiesManagementSystem.sln --configuration Release --no-restore

      - name: Run all tests (normal + fault injection)
        run: >
          dotnet test SocietiesManagementSystem.Tests/SocietiesManagementSystem.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=all-tests.trx"
          --results-directory ./TestResults

      - name: Run fault injection tests only
        run: >
          dotnet test SocietiesManagementSystem.Tests/SocietiesManagementSystem.Tests.csproj
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~FaultInjection"
          --logger "trx;LogFileName=fault-injection-tests.trx"
          --results-directory ./TestResults

      - name: Generate markdown test report
        shell: pwsh
        run: |
          $reportPath = "TestResults/Test_Report.md"
          $allTrx = "TestResults/all-tests.trx"
          $fiTrx = "TestResults/fault-injection-tests.trx"

          function Get-TrxSummary([string]$trxPath) {
            if (!(Test-Path $trxPath)) {
              return @{
                total = 0; executed = 0; passed = 0; failed = 0; error = 0;
                timeout = 0; aborted = 0; inconclusive = 0; passedButRunAborted = 0;
                notRunnable = 0; notExecuted = 0; disconnected = 0; warning = 0;
                completed = 0; inProgress = 0; pending = 0
              }
            }

            [xml]$xml = Get-Content $trxPath
            $c = $xml.TestRun.ResultSummary.Counters

            return @{
              total = [int]$c.total
              executed = [int]$c.executed
              passed = [int]$c.passed
              failed = [int]$c.failed
              error = [int]$c.error
              timeout = [int]$c.timeout
              aborted = [int]$c.aborted
              inconclusive = [int]$c.inconclusive
              passedButRunAborted = [int]$c.passedButRunAborted
              notRunnable = [int]$c.notRunnable
              notExecuted = [int]$c.notExecuted
              disconnected = [int]$c.disconnected
              warning = [int]$c.warning
              completed = [int]$c.completed
              inProgress = [int]$c.inProgress
              pending = [int]$c.pending
            }
          }

          $all = Get-TrxSummary $allTrx
          $fi = Get-TrxSummary $fiTrx

          @"
          # Test Execution Report

          Generated by GitHub Actions from TRX logs.

          ## All Tests

          - Total: $($all.total)
          - Executed: $($all.executed)
          - Passed: $($all.passed)
          - Failed: $($all.failed)
          - Not Executed (includes skipped): $($all.notExecuted)

          ## Fault Injection Tests

          - Total: $($fi.total)
          - Executed: $($fi.executed)
          - Passed: $($fi.passed)
          - Failed: $($fi.failed)
          - Not Executed (includes skipped): $($fi.notExecuted)

          ## Raw Files

          - `TestResults/all-tests.trx`
          - `TestResults/fault-injection-tests.trx`
          "@ | Set-Content -Path $reportPath -Encoding UTF8

          Get-Content $reportPath | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Publish (Release)
        run: dotnet publish SocietiesManagementSystem.sln --configuration Release --output ./artifacts/publish --no-build

      - name: Upload test reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: SocietiesManagementSystem-test-reports
          path: TestResults/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SocietiesManagementSystem-win-x64
          path: artifacts/publish/